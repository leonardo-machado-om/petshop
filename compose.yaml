name: petshop

services:
  postgres:
    image: postgres:16-alpine
    container_name: petshop-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-petshop_db}
      POSTGRES_USER: ${DB_USERNAME:-petshop_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-petshop_password}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  wiremock:
    image: wiremock/wiremock:3.13.2
    container_name: petshop-wiremock
    ports:
      - "127.0.0.1:8082:8080"
    volumes:
      - ./src/test/resources/wiremock/consulta-cep:/home/wiremock
    command:
      - "--verbose"

volumes:
  postgres_data: