name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Build e testes
    runs-on: ubuntu-latest

    env:
      CEP_API_BASE_URL: http://localhost:8082

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Liberar Maven Wrapper
        run: chmod +x mvnw

      - name: Build e testes
        run: ./mvnw clean verify